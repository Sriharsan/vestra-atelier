<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline — Vestra</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f0e6;
      color: #211c18;
      font-family: "Inter Tight", "Inter", system-ui, sans-serif;
    }
    .card {
      max-width: 400px;
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-family: Georgia, serif;
      font-size: 2.5rem;
      letter-spacing: -0.02em;
      line-height: 1;
      margin: 0 0 1rem;
    }
    p { color: #5a5149; font-size: 0.9rem; line-height: 1.6; }
    button {
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      background: #211c18;
      color: #f5f0e6;
      border: none;
      border-radius: 9999px;
      font-size: 0.875rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Off the thread.</h1>
    <p>You appear to be offline. The atelier will be back once your connection returns.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
